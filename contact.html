<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Contact | Brad Hobbs Web Design</title>
<meta name="description" content="Contact Brad Hobbs for professional website design services." />

<link rel="stylesheet" href="/brad-hobbswd/style.css?v=9">

<style>

/* ===== FORM CENTERING ===== */
.contactWrap{
  display:flex;
  justify-content:center;
  width:100%;
  margin:60px auto 50px auto;
}

/* ===== FORM SIZE ===== */
#quoteForm{
  width:100%;
  max-width:700px;
  margin:0 auto;
}

/* ===== CARD LOOK ===== */
#quoteForm.card{
  padding:28px;
  border-radius:20px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 25px 60px rgba(0,0,0,.55);
}

/* ===== GRID ===== */
.formGrid{
  display:grid;
  gap:14px;
}

/* ===== TEXT ===== */
.formTitle{
  text-align:left;
  font-size:24px;
  font-weight:900;
}

.formSubtitle{
  text-align:left;
  color:var(--muted);
  margin-bottom:18px;
}

/* ===== LABELS ===== */
.formLabel{
  display:block;
  text-align:left;
}

.formLabelTitle{
  font-size:12px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:6px;
  color:var(--muted);
}

/* ===== INPUTS ===== */
.formControl{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  color:white;
  font-size:15px;
}

.formControl::placeholder{
  color:rgba(255,255,255,.6);
}

.formControl:focus{
  outline:none;
  border:1px solid var(--accent);
  box-shadow:0 0 12px rgba(47,179,255,.25);
}

/* ===== BUTTON ===== */
#sendBtn{
  width:100%;
  margin-top:12px;
  padding:14px;
}

/* ===== BANNER SYSTEM ===== */
.bannerSection{ margin-top:30px; }

.bannerCard{
  display:block;
  width:min(1100px,92%);
  margin:0 auto;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);
  box-shadow:0 12px 40px rgba(0,0,0,.45), 0 0 20px rgba(47,179,255,.12);
}

.bannerCard img{ width:100%; display:block; }

.sectionDivider{
  width:min(900px,92%);
  height:1px;
  margin:50px auto;
  background:linear-gradient(90deg,transparent,rgba(47,179,255,.9),rgba(245,184,65,.9),transparent);
}

.serviceText{
  max-width:700px;
  margin:18px auto;
  text-align:center;
}

.serviceText p{
  color:var(--muted);
  line-height:1.6;
  margin-bottom:10px;
}

</style>

</head>

<body data-page="contact">

<div class="wrap">

<header id="siteHeader"></header>

<main>

<section class="bannerSection">
  <div class="bannerCard">
    <img src="images/27229CBD-3947-480E-AB39-1D9CC6B3202E.png" alt="Contact">
  </div>
</section>

<section class="bannerSection">
  <a href="mailto:brad.hobbs13@icloud.com" class="bannerCard">
    <img src="images/40411AF9-F914-4D71-AA94-30A89AC34E14.png" alt="Email First Communication">
  </a>
</section>

<div class="sectionDivider"></div>

<section class="serviceText">
  <h2>Direct Contact with Clarity</h2>
  <p>Click the banner above to open a ready to send email.</p>
  <p>A response is provided within 24 hours.</p>
</section>

<div class="sectionDivider"></div>

<section class="contactWrap">

<form 
id="quoteForm"
class="card contactForm"
method="POST"
target="hidden_iframe"
action="https://docs.google.com/forms/d/e/1FAIpQLSdBbVTznNfzNn8KuLN6IA3fsdxgC4MPw9ryoTQK5fJ4K0bFuA/formResponse">

<div class="formTitle">Send a Message</div>

<div class="formGrid">

<label class="formLabel">
<div class="formLabelTitle">Name</div>
<input name="entry.2005620554" required class="formControl">
</label>

<label class="formLabel">
<div class="formLabelTitle">Email</div>
<input name="entry.1045781291" type="email" required class="formControl">
</label>

<label class="formLabel">
<div class="formLabelTitle">Project Type</div>

<label><input type="radio" name="entry.1065046570" value="Starter Website Package" required> Starter Website Package</label>
<label><input type="radio" name="entry.1065046570" value="Business Website Package"> Business Website Package</label>
<label><input type="radio" name="entry.1065046570" value="Premium Website Package"> Premium Website Package</label>
<label><input type="radio" name="entry.1065046570" value="Not sure yet, need guidance"> Not sure yet, need guidance</label>
</label>

<label class="formLabel">
<div class="formLabelTitle">Inquiry Type</div>

<label><input type="radio" name="entry.1166974658" value="Price Inquiry" required> Price Inquiry</label>
<label><input type="radio" name="entry.1166974658" value="General Question"> General Question</label>
<label><input type="radio" name="entry.1166974658" value="Project Discussion"> Project Discussion</label>
<label><input type="radio" name="entry.1166974658" value="Other"> Other</label>
</label>

<button id="sendBtn" class="btn btnPrimary">Send Message</button>

</div>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

</section>

</main>

<div id="siteFooter"></div>

</div>

<script src="/brad-hobbswd/layout.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const form = document.querySelector(".contactForm");
  const iframe = document.querySelector('iframe[name="hidden_iframe"]');

  if(!form || !iframe) return;

  let submitted = false;

  form.addEventListener("submit", function(){
    const btn = document.getElementById("sendBtn");
    if(btn){
      btn.disabled = true;
      btn.textContent = "Sending...";
    }
    submitted = true;
  });

  iframe.addEventListener("load", function(){
    if(submitted){
      window.location.href = "thanks.html";
    }
  });

});
</script>

</body>
</html>
