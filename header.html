<!-- ===== HEADER STYLES ===== -->
<style>

/* ===== HEADER WRAPPER FIX ===== */
#siteHeader{
  position:relative;
  z-index:1000;
}

/* ===== CONTAINER ===== */
.topbar{
  position:fixed;
  top:12px; /* ← UPDATED: brings navbar down slightly */
  left:50%;
  transform:translateX(-50%);
  z-index:1000;

  display:flex;
  align-items:center;
  justify-content:space-between;

  width:92%;
  max-width:1100px;

  padding:10px 16px;

  border-radius:999px;

  backdrop-filter:blur(14px);
  background:rgba(5,10,20,.65);

  border:1px solid rgba(255,255,255,.12);

  box-shadow:
    0 10px 30px rgba(0,0,0,.35);
}

/* ===== BRAND ===== */
.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{
  height:40px;
  display:block;
}

.brandText{
  display:flex;
  flex-direction:column;
  line-height:1.1;
}

.brandText strong{
  font-size:14px;
  font-weight:900;
  color:white;
}

.brandText span{
  font-size:11px;
  color:rgba(255,255,255,.7);
}

/* ===== NAV ===== */
.nav{
  display:flex;
  gap:22px;
  align-items:center;
}

.nav a{
  color:rgba(255,255,255,.7);
  font-weight:700;
  font-size:14px;
  text-decoration:none;
  transition:.25s ease;
}

/* ===== HOVER GLOW ===== */
.nav a:hover{
  color:white;
  text-shadow:
    0 0 8px rgba(255,255,255,.6),
    0 0 18px rgba(47,179,255,.7);
}

/* ===== ACTIVE GLOW ===== */
.nav a.active{
  color:white;
  font-weight:900;

  text-shadow:
    0 0 10px rgba(47,179,255,.9),
    0 0 22px rgba(47,179,255,.7);
}

/* ===== MOBILE BUTTON ===== */
.menuToggle{
  display:none;
  flex-direction:column;
  gap:5px;
  background:none;
  border:none;
  cursor:pointer;
}

.menuToggle span{
  width:26px;
  height:3px;
  background:white;
  border-radius:3px;
}

/* ===== MOBILE MENU ===== */
.mobileMenu{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;

  background:#050a14;
  padding:40px 20px;

  display:flex;
  flex-direction:column;
  gap:20px;

  transition:left .3s ease;
  z-index:9999;
}

.mobileMenu a{
  color:white;
  font-size:18px;
  text-decoration:none;
}

.mobileMenu.open{
  left:0;
}

/* ===== OVERLAY ===== */
.menuOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
  z-index:9998;
}

.menuOverlay.active{
  opacity:1;
  pointer-events:auto;
}

/* ===== MOBILE BREAKPOINT ===== */
@media (max-width:1024px){

  .nav{
    display:none;
  }

  .menuToggle{
    display:flex;
  }

}

/* ===== SCROLL EFFECT ===== */
.topbar.scrolled{
  box-shadow:
    0 14px 40px rgba(0,0,0,.5),
    0 0 20px rgba(47,179,255,.25);
}

</style>

  <!-- NAV -->
  <nav class="nav">

    <a data-nav="work" href="/brad-hobbswd/links.html">My Work</a>
    <a data-nav="resources" href="/brad-hobbswd/resources.html">Resources</a>
    <a data-nav="contact" href="/brad-hobbswd/contact.html">Contact</a>
  </nav>

  <!-- MOBILE BUTTON -->
