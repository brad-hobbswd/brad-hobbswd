<!doctype html>

<link rel="stylesheet" href="/brad-hobbswd/style.css?v=2">

<style>

/* ===== CORE LAYOUT ===== */

.bannerSection{
  margin-top:40px;
}

.bannerCard{
  width:min(1100px,92%);
  margin:20px auto;
  border-radius:22px;
  overflow:hidden;

  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);

  box-shadow:
    0 12px 40px rgba(0,0,0,.45),
    0 0 20px rgba(47,179,255,.12);
}

.bannerImg{
  width:100%;
  height:auto;
  display:block;
}

/* ===== GRID ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:22px;
}

/* ===== DIVIDER ===== */

.sectionDivider{
  width:min(900px,92%);
  height:1px;
  margin:50px auto;

  background:linear-gradient(
    90deg,
    transparent,
    rgba(47,179,255,.9),
    rgba(245,184,65,.9),
    transparent
  );
}

/* ===== FOOTER ===== */

#siteFooter{
  width:100%;
  display:flex;
  justify-content:center;
}

#siteFooter footer{
  width:min(1100px,92%);
  text-align:center;
  margin:22px auto 10px auto;
  color:rgba(184,199,230,.72);
  font-size:13px;
}

</style>

<meta name="description" content="Projects, writing, and resources by Brad Hobbs." />

</head>
