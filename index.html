<body data-page="home">
  <div class="wrap">

    <header id="siteHeader"></header>

    <main>

      <div class="bannerPrimary">
        <img src="banner.jpeg" alt="Brad Hobbs Professional Web Designer Banner" draggable="false">
      </div>

      <div class="bannerSecondary">
        <img src="banner2.png" alt="Modern Websites With Clear Structure Banner" draggable="false">
      </div>

<div class="homeIntro">

  <p>
  Hosting and domain materials for building websites appear on the resources page. Website design projects return to Brad Hobbs Web Design.
  </p>

  <div class="resource-center">
    <a href="resources.html" class="resource-button">
      Website Hosting and Domain Resources
    </a>
  </div>

</div>

    </main>

    <div id="siteFooter"></div>

  </div>

  <script src="layout.js"></script>

  <script>
  (function () {

    const form = document.getElementById("quoteForm");
    const status = document.getElementById("formStatus");
    const btn = document.getElementById("sendBtn");

    form.addEventListener("submit", async function (e) {

      e.preventDefault();

      status.textContent = "Sending...";
      btn.disabled = true;

      const formData = new FormData(form);

      try {

        const res = await fetch("https://formspree.io/f/mzdajjkb", {
          method: "POST",
          headers: { "Accept": "application/json" },
          body: formData
        });

        if (res.ok) {
          window.location.href = "thanks.html";
          return;
        }

        const data = await res.json().catch(() => ({}));
        status.textContent = data.error || "Submission failed. Please try again.";

      } catch (err) {

        status.textContent = "Network error. Please try again.";

      } finally {

        btn.disabled = false;

      }

    });

  })();
  </script>

</body>
</html>
