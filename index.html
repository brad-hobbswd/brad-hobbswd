<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Home | Brad Hobbs Web Design</title>

<link rel="icon" href="/brad-hobbswd/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/brad-hobbswd/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/brad-hobbswd/images/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/brad-hobbswd/images/favicon-180.png">

<meta name="description" content="Brad Hobbs builds responsive, modern websites with clear structure and strong calls to action." />

<link rel="stylesheet" href="/brad-hobbswd/style.css?v=3" />

<style>

/* ===== MATCH SERVICES STRUCTURE ===== */

.bannerSection{
  margin-top:40px;
}

/* UNIFIED BANNER STYLE */
.bannerCard{
  width:min(1100px,92%);
  margin:20px auto;
  border-radius:22px;
  overflow:hidden;

  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);

  box-shadow:
    0 12px 40px rgba(0,0,0,.45),
    0 0 20px rgba(47,179,255,.12);
}

.bannerCard img{
  width:100%;
  height:auto;
  display:block;
}

/* INTRO */
.homeIntro{
  max-width:700px;
  margin:18px auto;
  text-align:center;
}

.homeIntro p{
  color:var(--muted);
  line-height:1.6;
}

/* BUTTON CENTER */
.resource-center{
  margin-top:18px;
}

/* DIVIDER */
.sectionDivider{
  width:min(900px,92%);
  height:1px;
  margin:40px auto;

  background:linear-gradient(
    90deg,
    transparent,
    rgba(47,179,255,.9),
    rgba(245,184,65,.9),
    transparent
  );
}

/* FOOTER MATCH */
#siteFooter{
  display:flex;
  justify-content:center;
}

#siteFooter footer{
  width:min(1100px,92%);
  text-align:center;
  margin:22px auto 10px auto;
  color:rgba(184,199,230,.72);
  font-size:13px;
}

  body[data-page="home"] .bannerSection:first-of-type{
  margin-top:10px;
}

</style>

</head>

<body data-page="home">

<div class="wrap">

<header id="siteHeader"></header>

<main>

<!-- HERO -->
<section class="bannerSection">
  <div class="bannerCard">
    <img src="587C175D-DD5A-4090-8BEA-D9BD89C76DF9.png" alt="Brad Hobbs Professional Web Designer Banner">
  </div>
</section>

<div class="sectionDivider"></div>

<!-- SUPPORT -->
<section class="bannerSection">
  <div class="bannerCard">
  <img src="5700AE32-C77D-4B9D-A147-A6A92F66820A.png" alt="Modern Websites With Clear Structure Banner">
  </div>
</section>

<div class="sectionDivider"></div>

<!-- INTRO -->
<section class="homeIntro">

<p>
Hosting and domain materials for building websites appear on the resources page. Website design projects return to Brad Hobbs Web Design.
</p>

<div class="resource-center">
  <a href="/brad-hobbswd/resources.html" class="btn btnPrimary">
    Website Hosting and Domain Resources
  </a>
</div>

</section>

</main>

<div id="siteFooter"></div>

</div>

<script src="/brad-hobbswd/layout.js"></script>

</body>
</html>
