<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="/brad-hobbswd/style.css?v=2">

<!-- (ALL YOUR ORIGINAL CSS STAYS EXACTLY THE SAME) -->

<title>Packages | Brad Hobbs Web Design</title>

<link rel="icon" href="/brad-hobbswd/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/brad-hobbswd/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/brad-hobbswd/images/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/brad-hobbswd/images/favicon-180.png">

</head>

<body data-page="packages">

<div class="wrap">

<header id="siteHeader"></header>

<main>

<!-- (ALL YOUR ORIGINAL CONTENT REMAINS EXACTLY THE SAME) -->

</main>

<div class="sectionDivider footerDivider"></div>
<div id="siteFooter"></div>

</div>

<!-- MODAL (UNCHANGED) -->
<div id="packageModal" class="packageModal">
  <div class="modalContent" onclick="event.stopPropagation()">
    <span class="modalClose" onclick="closePackage()">✕</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="/brad-hobbswd/layout.js"></script>

<script>

/* =========================
   OPEN PACKAGE MODAL
========================= */
function openPackage(id){

  const hiddenField = document.getElementById("selectedPackage");

  if(hiddenField){
    if(id === "starter") hiddenField.value = "Starter Website Package";
    if(id === "business") hiddenField.value = "Business Website Package";
    if(id === "premium") hiddenField.value = "Premium Custom Website Package";
  }

  const source = document.getElementById(id);
  if(!source) return;

  const modal = document.getElementById("packageModal");
  const body = document.getElementById("modalBody");

  body.innerHTML = source.innerHTML;
  modal.classList.add("active");

  document.body.style.overflow = "hidden";
}

/* CLOSE MODAL */
function closePackage(){
  const modal = document.getElementById("packageModal");
  if(!modal) return;

  modal.classList.remove("active");
  document.body.style.overflow = "auto";
}

/* CLICK OUTSIDE */
window.addEventListener("click", function(e){
  const modal = document.getElementById("packageModal");
  if(e.target === modal){
    closePackage();
  }
});

/* =========================
   FORM SUBMIT HANDLER
========================= */
document.addEventListener("DOMContentLoaded", function(){

  const form = document.querySelector(".customForm");
  const iframe = document.querySelector('iframe[name="hidden_iframe"]');

  if(!form || !iframe) return;

  let submitted = false;

  form.addEventListener("submit", function(){
    submitted = true;
  });

  iframe.addEventListener("load", function(){
    if(submitted){
      window.location.href = "/brad-hobbswd/payment.html";  /* ✅ ONLY CHANGE */
    }
  });

});

/* SCROLL */
function goToForm(){
  closePackage();

  const section = document.getElementById("packageContact");
  if(!section) return;

  section.scrollIntoView({
    behavior: "smooth"
  });
}

</script>

</body>
</html>
