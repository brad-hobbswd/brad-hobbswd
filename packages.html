<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/brad-hobbswd/style.css?v=2">

<title>Packages | Brad Hobbs Web Design</title>
<meta name="description" content="Website package options: Starter, Business Growth, and Premium Custom." />
</head>

<body class="packages-page" data-page="packages">

<div class="wrap">

<header id="siteHeader"></header>

<main>

<!-- BANNER -->
<section class="bannerSection">
  <div class="bannerCard">
    <img class="bannerImg" src="images/A061F20E-B72E-45DD-B863-37AEC5BFFF82.jpeg" alt="Website Packages">
  </div>
</section>

<!-- INTRO -->
<section class="packagesIntro">
  <h2 class="packagesTitle">Explore Our Website Packages</h2>

  <p class="packagesSubtitle">
    Click each package card below to view the full details and care plan options
    <span class="clickIcon">👇</span>
  </p>
</section>

<div class="sectionDivider"></div>

<!-- PACKAGE CARDS -->
<section class="packageSection">

  <div class="package-card" onclick="openPackage('starter')">
    <img src="C3857A28-69EA-4491-BFE7-EED2D131AE9B.png" alt="Starter Website Package">
  </div>

  <div class="package-card" onclick="openPackage('business')">
    <img src="428002DB-DBEC-48CD-8ED0-851AE686E827.png" alt="Business Website Package">
  </div>

  <div class="package-card" onclick="openPackage('premium')">
    <img src="1CED57CD-3692-4A62-9B8C-E377BE84063A.png" alt="Premium Custom Website Package">
  </div>

</section>

<div class="sectionDivider"></div>

<!-- FORM SECTION -->
<section id="packageContact" class="formSection">

  <h2 class="formTitleMain">Start Your Project</h2>

  <p class="formSubtitle">
    Complete the form below to begin your website request.
  </p>

  <div class="formEmbed">
    <iframe 
      src="https://docs.google.com/forms/d/e/1FAIpQLSfmeW2hfpYLFM9PzfKvhVFQLB5MkKnf88Z36SW7MF082nbg_A/viewform?embedded=true" 
      width="100%" 
      height="1000"
      frameborder="0">
      Loading…
    </iframe>
  </div>

</section>

</main>

<div id="siteFooter"></div>

</div>

<!-- MODAL -->
<div id="packageModal" class="packageModal">
  <div class="modalContent">
    <span class="modalClose" onclick="closePackage()">✕</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="/brad-hobbswd/layout.js"></script>

<script>

function openPackage(id){
  const modal = document.getElementById("packageModal");
  const body = document.getElementById("modalBody");
  const content = document.getElementById(id).innerHTML;

  body.innerHTML = content;
  modal.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closePackage(){
  document.getElementById("packageModal").classList.remove("active");
  document.body.style.overflow = "auto";
}

window.addEventListener("click", function(e){
  const modal = document.getElementById("packageModal");
  if(e.target === modal){
    closePackage();
  }
});

function goToForm(){
  closePackage();
  document.getElementById("packageContact").scrollIntoView({
    behavior: "smooth"
  });
}

</script>

</body>
</html>
