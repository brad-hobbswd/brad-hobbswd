<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="/brad-hobbswd/style.css?v=2">

<style>

/* ===== INTRO ===== */
.packagesIntro{
  text-align:center;
  margin-top:20px;
}

.packagesTitle{
  font-size:28px;
  font-weight:900;
}

.packagesSubtitle{
  color:var(--muted);
  margin-top:10px;
}

/* ===== BANNER ===== */
.bannerSection{
  margin-top:40px;
}

.bannerCard{
  width:min(1100px,92%);
  margin:20px auto;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);
  box-shadow:
    0 12px 40px rgba(0,0,0,.45),
    0 0 20px rgba(47,179,255,.12);
}

.bannerImg{
  width:100%;
  display:block;
}

/* ===== GRID ===== */
.packageSection{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
  margin:30px auto;
  width:min(1100px,92%);
}

/* ===== CARDS ===== */
.package-card{
  cursor:pointer;
  border-radius:20px;
  overflow:hidden;
  transition:.25s ease;
  box-shadow:
    0 12px 35px rgba(0,0,0,.45),
    0 0 20px rgba(47,179,255,.1);
}

.package-card img{
  width:100%;
  display:block;
}

.package-card:hover{
  transform:translateY(-6px);
}

/* ===== DIVIDER ===== */
.sectionDivider{
  width:min(900px,92%);
  height:1px;
  margin:50px auto;
  background:linear-gradient(
    90deg,
    transparent,
    rgba(47,179,255,.9),
    rgba(245,184,65,.9),
    transparent
  );
}

/* ===== MODAL ===== */
.packageModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.packageModal.active{
  display:flex;
}

.modalContent{
  background:#050a14;
  padding:30px;
  border-radius:20px;
  width:min(700px,92%);
  max-height:90vh;
  overflow:auto;
  position:relative;
  animation:fadeIn .25s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(.95);}
  to{opacity:1; transform:scale(1);}
}

.modalClose{
  position:absolute;
  top:10px;
  right:14px;
  font-size:22px;
  cursor:pointer;
}

/* ===== FORM ===== */
.formSection{
  text-align:center;
  width:min(900px,92%);
  margin:40px auto;
}

.formCard{
  margin-top:20px;
  padding:24px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
}

.formNote{
  color:var(--muted);
  margin-bottom:16px;
}

/* ===== CUSTOM FORM ===== */
.customForm{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.formGroup{
  text-align:left;
}

.formGroup label{
  font-weight:700;
  color:var(--muted);
  font-size:14px;
}

.formGroup input,
.formGroup textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:var(--text);
}

.formGroup input:focus,
.formGroup textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(47,179,255,.2);
}

/* SUCCESS */
#formSuccess{
  display:none;
  color:var(--accent2);
  font-weight:700;
  margin-top:20px;
}

/* ===== FOOTER ===== */
#siteFooter{
  display:flex;
  justify-content:center;
}

#siteFooter footer{
  width:min(1100px,92%);
  text-align:center;
}

</style>

<title>Packages | Brad Hobbs Web Design</title>

</head>

<body data-page="packages">

<div class="wrap">

<header id="siteHeader"></header>

<main>

<!-- BANNER -->
<section class="bannerSection">
  <div class="bannerCard">
    <img class="bannerImg" src="images/A061F20E-B72E-45DD-B863-37AEC5BFFF82.jpeg">
  </div>
</section>

<!-- INTRO -->
<section class="packagesIntro">
  <h2 class="packagesTitle">Explore Our Website Packages</h2>
  <p class="packagesSubtitle">
    Click each package card below to view the full details 👇
  </p>
</section>

<div class="sectionDivider"></div>

<!-- CARDS -->
<section class="packageSection">
  <div class="package-card" onclick="openPackage('starter')"><img src="C3857A28-69EA-4491-BFE7-EED2D131AE9B.png"></div>
  <div class="package-card" onclick="openPackage('business')"><img src="428002DB-DBEC-48CD-8ED0-851AE686E827.png"></div>
  <div class="package-card" onclick="openPackage('premium')"><img src="1CED57CD-3692-4A62-9B8C-E377BE84063A.png"></div>
</section>

<div class="sectionDivider"></div>

<!-- FORM -->
<section id="packageContact" class="formSection">

<h2>Start Your Project</h2>

<div class="formCard">

<p class="formNote">
This application helps create a clear direction for your website.
</p>

<form 
action="https://docs.google.com/forms/d/e/1FAIpQLSfmeW2hfpYLFM9PzfKvhVFQLB5MkKnf88Z36SW7MF082nbg_A/formResponse"
method="POST"
target="hidden_iframe"
class="customForm"
>

<div class="formGroup">
<label>Full Name</label>
<input type="text" name="entry.1478334189" required>
</div>

<div class="formGroup">
<label>Email</label>
<input type="email" name="entry.1799374150" required>
</div>

<div class="formGroup">
<label>Phone</label>
<input type="text" name="entry.1506499068">
</div>

<div class="formGroup">
<label>Business Name</label>
<input type="text" name="entry.1039866069">
</div>

<div class="formGroup">
<label>Website Type</label>
<input type="text" name="entry.592094893">
</div>

<div class="formGroup">
<label>Project Details</label>
<textarea name="entry.272301432"></textarea>
</div>

<div class="formGroup">
<label>Additional Notes</label>
<textarea name="entry.1913681571"></textarea>
</div>

<button class="btn btnPrimary">Submit Application</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<div id="formSuccess">Your request has been submitted successfully.</div>

</div>

</section>

</main>

<div id="siteFooter"></div>

</div>

<!-- MODAL -->
<div id="packageModal" class="packageModal">
  <div class="modalContent" onclick="event.stopPropagation()">
    <span class="modalClose" onclick="closePackage()">✕</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="/brad-hobbswd/layout.js"></script>

<script>
function openPackage(id){
  document.getElementById("modalBody").innerHTML =
  document.getElementById(id).innerHTML;
  document.getElementById("packageModal").classList.add("active");
}

function closePackage(){
  document.getElementById("packageModal").classList.remove("active");
}

window.addEventListener("click", function(e){
  if(e.target.id === "packageModal"){
    closePackage();
  }
});

document.querySelector(".customForm").addEventListener("submit", function(){
  setTimeout(()=>{
    document.querySelector(".customForm").style.display="none";
    document.getElementById("formSuccess").style.display="block";
  },800);
});
</script>

</body>
</html>
