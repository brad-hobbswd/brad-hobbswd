<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="/brad-hobbswd/style.css?v=5">

<title>Packages | Brad Hobbs Web Design</title>

</head>

<body data-page="packages">

<div class="wrap">

<header id="siteHeader"></header>

<main>

<!-- INTRO -->
<section class="packagesIntro">
  <h2 class="packagesTitle">Choose the Right Website for Your Vision</h2>
  <p class="packagesSubtitle">
    Tap a package below to explore what is possible 👇
  </p>
</section>

<div class="sectionDivider"></div>

<!-- CARDS -->
<section class="packageSection">
  <div class="package-card" onclick="openPackage('starter')">
    <img src="C3857A28-69EA-4491-BFE7-EED2D131AE9B.png">
  </div>

  <div class="package-card" onclick="openPackage('business')">
    <img src="428002DB-DBEC-48CD-8ED0-851AE686E827.png">
  </div>

  <div class="package-card" onclick="openPackage('premium')">
    <img src="1CED57CD-3692-4A62-9B8C-E377BE84063A.png">
  </div>
</section>

<div class="sectionDivider"></div>

<!-- FORM -->
<section id="packageContact" class="formSection">

<div class="formCard">

<form 
action="https://docs.google.com/forms/d/e/1FAIpQLSfmeW2hfpYLFM9PzfKvhVFQLB5MkKnf88Z36SW7MF082nbg_A/formResponse"
method="POST"
target="hidden_iframe"
class="customForm">

<!-- NAME -->
<div class="formGroup">
<label>Full Name *</label>
<input type="text" name="entry.2136352736" required>
</div>

<!-- FIXED hidden (NO name) -->
<input type="hidden" id="selectedPackage">

<!-- EMAIL -->
<div class="formGroup">
<label>Email Address *</label>
<input type="email" name="entry.1275926525" required>
</div>

<!-- BUSINESS -->
<div class="formGroup">
<label>Organization or Business Name</label>
<input type="text" name="entry.378796952">
</div>

<!-- LOCATION -->
<div class="formGroup">
<label>Location (City & State)</label>
<input type="text" name="entry.1659577324">
</div>

<!-- PACKAGE -->
<div class="formGroup">
<label>Which website package are you interested in?</label>

<label><input type="radio" name="entry.1478334189" value="Starter Website Package" required> Starter Website Package</label>
<label><input type="radio" name="entry.1478334189" value="Business Website Package"> Business Website Package</label>
<label><input type="radio" name="entry.1478334189" value="Premium Website Package"> Premium Website Package</label>
<label><input type="radio" name="entry.1478334189" value="Not sure yet"> Not sure yet</label>
</div>

<!-- PURPOSE -->
<div class="formGroup">
<label>Describe the purpose of the website</label>
<textarea name="entry.1603760099"></textarea>
</div>

<!-- TIMELINE -->
<div class="formGroup">
<label>Timeline</label>

<label><input type="radio" name="entry.592094893" value="ASAP"> ASAP</label>
<label><input type="radio" name="entry.592094893" value="30 days"> 30 days</label>
<label><input type="radio" name="entry.592094893" value="Flexible"> Flexible</label>
</div>

<!-- AGREEMENT -->
<div class="formGroup">
<label>
<input type="checkbox" 
name="entry.1913681571" 
value="Agreed" 
required>
I understand this application must be reviewed before payment is requested
</label>
</div>

<button class="btn btnPrimary">Submit Application</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

</section>

</main>

<div class="sectionDivider footerDivider"></div>
<div id="siteFooter"></div>

</div>

<!-- MODAL -->
<div id="packageModal" class="packageModal">
  <div class="modalContent" onclick="event.stopPropagation()">
    <span class="modalClose" onclick="closePackage()">✕</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="/brad-hobbswd/layout.js"></script>

<script>

/* OPEN MODAL + FIXED PACKAGE SELECT */
function openPackage(id){

  const radios = document.querySelectorAll('input[name="entry.1478334189"]');
  radios.forEach(r => r.checked = false);

  if(id === "starter"){
    document.querySelector('input[value="Starter Website Package"]').checked = true;
  }

  if(id === "business"){
    document.querySelector('input[value="Business Website Package"]').checked = true;
  }

  if(id === "premium"){
    document.querySelector('input[value="Premium Website Package"]').checked = true;
  }

  const source = document.getElementById(id);
  if(!source) return;

  const modal = document.getElementById("packageModal");
  const body = document.getElementById("modalBody");

  body.innerHTML = source.innerHTML;
  modal.classList.add("active");

  document.body.style.overflow = "hidden";
}

function closePackage(){
  document.getElementById("packageModal").classList.remove("active");
  document.body.style.overflow = "auto";
}

window.addEventListener("click", function(e){
  if(e.target.id === "packageModal"){
    closePackage();
  }
});

/* FORM SUBMIT */
document.addEventListener("DOMContentLoaded", function(){

  const form = document.querySelector(".customForm");
  const iframe = document.querySelector('iframe[name="hidden_iframe"]');

  let submitted = false;

  form.addEventListener("submit", function(){
    submitted = true;
  });

  iframe.addEventListener("load", function(){
    if(submitted){
      window.location.href = "/brad-hobbswd/payment.html";
    }
  });

});

function goToForm(){
  closePackage();
  document.getElementById("packageContact").scrollIntoView({ behavior: "smooth" });
}

</script>

<!-- HIDDEN MODAL CONTENT -->
<div id="starter" style="display:none;">
  <h2>Starter Website Package</h2>
  <p>Strong starting point for your online presence.</p>
  <button class="btn btnPrimary" onclick="goToForm()">Apply for This Package</button>
</div>

<div id="business" style="display:none;">
  <h2>Business Website Package</h2>
  <p>Designed for growth and visibility.</p>
  <button class="btn btnPrimary" onclick="goToForm()">Apply for This Package</button>
</div>

<div id="premium" style="display:none;">
  <h2>Premium Website Package</h2>
  <p>Built for expansion and impact.</p>
  <button class="btn btnPrimary" onclick="goToForm()">Apply for This Package</button>
</div>

</body>
</html>
